<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<!-- Navbar Fragment -->
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark" style="background-color: #1a237e;">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">
            <i class="bi bi-building"></i> Election Management System
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto align-items-center">
                <li class="nav-item" th:if="${session.loggedInUser != null}">
                    <span class="navbar-text text-light me-3">
                        <i class="bi bi-person-circle"></i>
                        <span th:text="${session.userName}">User</span>
                        <span class="badge bg-warning text-dark ms-1" th:text="${session.userRole}">ROLE</span>
                    </span>
                </li>
                <li class="nav-item" th:if="${session.loggedInUser != null}">
                    <a class="btn btn-outline-light btn-sm" href="/logout">
                        <i class="bi bi-box-arrow-right"></i> Logout
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- Head Fragment -->
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Election Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .card {
            border: none;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .btn-primary {
            background-color: #1a237e;
            border-color: #1a237e;
        }
        .btn-primary:hover {
            background-color: #283593;
            border-color: #283593;
        }
    </style>
</head>

<!-- Footer Fragment -->
<footer th:fragment="footer" class="text-center text-muted py-4 mt-5 border-top">
    <p class="mb-0">&copy; 2026 Election Management System — India</p>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</footer>

</html>
