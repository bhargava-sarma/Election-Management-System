<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Voter Login')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0"><i class="bi bi-box-arrow-in-right"></i> Voter Login</h4>
                </div>
                <div class="card-body">
                    <div th:if="${success}" class="alert alert-success">
                        <i class="bi bi-check-circle"></i> <span th:text="${success}"></span>
                    </div>
                    <div th:if="${error}" class="alert alert-danger">
                        <i class="bi bi-exclamation-triangle"></i> <span th:text="${error}"></span>
                    </div>
                    <form th:action="@{/voter/login}" method="post" th:object="${loginDTO}">
                        <div class="mb-3">
                            <label for="email" class="form-label">Email Address</label>
                            <input type="email" class="form-control" id="email" th:field="*{email}" required>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control" id="password" th:field="*{password}" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">
                            <i class="bi bi-box-arrow-in-right"></i> Login
                        </button>
                    </form>
                    <div class="text-center mt-3">
                        <a href="/voter/register">New voter? Register here</a> |
                        <a href="/">Back to Home</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
